# .github/workflows/container-scan.yml
name: Container Security Scan

on:
  push:
    branches: [main]
    paths:
      - '**/Dockerfile*'
      - 'docker-compose*.yml'
      - '.grype.yaml'
      - '.github/workflows/container-scan.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/Dockerfile*'
      - 'docker-compose*.yml'
      - '.grype.yaml'
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 8 AM UTC

jobs:
  grype-server:
    name: Scan Server Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Build production server image
        run: docker build -f server/Dockerfile -t devtools-server:prod ./server

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@v7
        id: grype-server
        with:
          image: 'devtools-server:prod'
          output-format: 'sarif'
          severity-cutoff: 'high'
          fail-build: true

      - name: Upload Grype scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ steps.grype-server.outputs.sarif }}
          category: 'grype-server'

  grype-dashboard:
    name: Scan Dashboard Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Build production dashboard image
        run: docker build -f dashboard/Dockerfile -t devtools-dashboard:prod ./dashboard

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@v7
        id: grype-dashboard
        with:
          image: 'devtools-dashboard:prod'
          output-format: 'sarif'
          severity-cutoff: 'high'
          fail-build: true
          only-fixed: true  # Ignore unfixed vulnerabilities (glibc CVEs pending Debian backport)

      - name: Upload Grype scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ steps.grype-dashboard.outputs.sarif }}
          category: 'grype-dashboard'
